<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TimingStaff Pro</title>

<style>

body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 80px; }

.card { background: #111; padding: 15px; margin: 10px; border-radius: 12px; border: 1px solid #333; }

.tab-container { display: flex; gap: 10px; margin-bottom: 15px; }

.tab-btn { flex: 1; padding: 12px; border: none; background: #333; color: #fff; border-radius: 6px; cursor: pointer; }

.tab-btn.active { background: #4f46e5; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

input { background: #222; border: 1px solid #444; color: #fff; padding: 8px; width: 100%; border-radius: 4px; box-sizing: border-box; margin: 2px 0; }

.nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #333; display: flex; height: 70px; z-index: 9999; }

.nav button { flex: 1; background: none; border: none; color: #fff; font-size: 0.7rem; }

</style>

</head>

<body>


<div class="card">

<h3>💼 시재금 점검</h3>

<input type="text" id="staffName" placeholder="기입자 이름">


<div class="tab-container">

<button class="tab-btn active" onclick="setMode('open')">오픈(Open)</button>

<button class="tab-btn" onclick="setMode('close')">마감(Close)</button>

</div>


<div class="grid-2">

<div>

<label style="font-size:0.7rem;">준비시재</label>

<input type="number" class="calc-open" placeholder="5만원(장)" oninput="calc()">

<input type="number" class="calc-open" placeholder="1만원(장)" oninput="calc()">

<input type="number" class="calc-open" placeholder="5천원(장)" oninput="calc()">

<input type="number" class="calc-open" placeholder="1천원(장)" oninput="calc()">

</div>

<div>

<label style="font-size:0.7rem;">예비시재</label>

<input type="number" class="calc-open" placeholder="5만원(장)" oninput="calc()">

<input type="number" class="calc-open" placeholder="1만원(장)" oninput="calc()">

<input type="number" class="calc-open" placeholder="5천원(장)" oninput="calc()">

<input type="number" class="calc-open" placeholder="1천원(장)" oninput="calc()">

</div>

</div>


<div style="margin-top:15px; text-align:right; font-weight:bold;">

총 합계: <span id="totalDisplay" style="color:#22c55e;">0</span>원

</div>

<button style="width:100%; padding:15px; margin-top:10px; background:#2563eb; border:none; border-radius:8px; color:white;">기록 저장하기</button>

</div>


<script>

function setMode(mode) {

document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

event.currentTarget.classList.add('active');

}


function calc() {

let total = 0;

document.querySelectorAll('.calc-open').forEach(input => {

let val = parseInt(input.value) || 0;

let unit = parseInt(input.placeholder.replace(/[^0-9]/g, '')) * 10000;

if(input.placeholder.includes('5천')) unit = 5000;

if(input.placeholder.includes('1천')) unit = 1000;

total += (val * unit);

});

document.getElementById('totalDisplay').innerText = total.toLocaleString();

}

</script>


</body>

</html>
