<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TimingStaff</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">

    <header class="top-header">
      <div class="header-top-row">
        <h1>🎵 TimingStaff</h1> <div class="staff-select-box">
          <span>👤</span>
          <select id="staffSelect">
            <option value="마린">마린</option>
            <option value="애디">애디</option>
            <option value="타마">타마</option>
            <option value="도트">도트</option>
          </select>
        </div>
      </div>

      <div class="header-bottom-row">
        <span id="todayDate">날짜 불러오는 중</span>
        <span>🌤31°C</span>
        <span>☔20%</span>
        <span>😷좋음</span>
      </div>
    </header>

    <section id="statusBox" class="status-card status-red hidden">
    </section>
    <section id="homeScreen">
      <section class="card notice-card">
        <h3>📢 공지</h3>
        <div class="notice-box">
          <p>POS 마감 전 현금함 확인</p>
        </div>
        <button id="noticeConfirmBtn" class="main-btn">확인했습니다</button>
        <div id="readList" class="log-list"></div>
      </section>

      <section class="card">
        <h3>⏰ 출퇴근</h3>
        <div class="button-grid">
          <button id="clockInBtn" class="green-btn">출근하기</button>
          <button id="clockOutBtn" class="red-btn">퇴근하기</button>
        </div>
        <p id="clockLog" class="small-text">아직 기록이 없습니다.</p>
      </section>

      <section class="card">
        <div class="section-title-row">
          <h3>📋 오늘 해야 할 일</h3>
          <span id="taskProgressText" class="mini-badge">0 / 3 완료</span>
        </div>

        <div class="progress-bar task-progress">
          <div id="taskProgressFill" class="progress-fill task-fill"></div>
        </div>

        <div id="taskList"></div>
      </section>

      <section class="card cat-care-card">
        <h3>🐱 냥케어</h3>

        <div class="care-block">
          <h4>밥</h4>

          <div class="care-row">
            <span>오픈</span>
            <label><input type="checkbox" /> 애디</label>
            <label><input type="checkbox" /> 타마</label>
          </div>

          <div class="care-row">
            <span>마감</span>
            <label><input type="checkbox" /> 애디</label>
            <label><input type="checkbox" /> 타마</label>
          </div>
        </div>

        <div class="care-block">
          <h4>배변</h4>

          <div class="care-row vertical">
            <span>오픈</span>
            <label><input type="checkbox" /> 왼쪽 응가</label>
            <label><input type="checkbox" /> 왼쪽 쉬야</label>
            <label><input type="checkbox" /> 오른쪽 응가</label>
            <label><input type="checkbox" /> 오른쪽 쉬야</label>
          </div>

          <div class="care-row vertical">
            <span>마감</span>
            <label><input type="checkbox" /> 왼쪽 응가</label>
            <label><input type="checkbox" /> 왼쪽 쉬야</label>
            <label><input type="checkbox" /> 오른쪽 응가</label>
            <label><input type="checkbox" /> 오른쪽 쉬야</label>
          </div>
        </div>

        <div class="care-check-grid">
          <label><input type="checkbox" /> 구토</label>
          <label><input type="checkbox" /> 설사</label>
          <label><input type="checkbox" /> 빗질</label>
          <label><input type="checkbox" /> 사냥</label>
          <label><input type="checkbox" /> 산책</label>
        </div>

        <textarea class="memo-input" placeholder="냥케어 특이사항을 적어주세요."></textarea>
      </section>

      <section class="card sales-input-card">
        <h3>💰 매출 기록</h3>

        <label>
          카드
          <input type="number" placeplacehol="카드 매출" />
        </label>

        <label>
          현금
          <input type="number" placeholder="현금 매출" />
        </label>

        <label>
          계좌이체
          <input type="number" placeholder="계좌이체 매출" />
        </label>

        <label>
          준비시재
          <input type="number" placeholder="준비시재" />
        </label>

        <label>
          예비시재
          <input type="number" placeholder="예비시재" />
        </label>

        <button type="button" class="main-btn">매출 기록하기</button>
      </section>

    <nav class="bottom-nav">
      <button id="homeBtn">홈</button>
      <button id="workLogBtn">작업일지</button>
      <button id="inventoryBtn">재고현황</button>
      <button id="catCareBtn">고양이</button>
      <button id="managerBtn">관리자</button>
    </nav>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/attendance.js"></script>
  <script src="js/notice.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/manager.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
