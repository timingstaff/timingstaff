<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimingStaff Pro</title>
  <style>
    /* 필수 기본 스타일 */
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; padding-bottom: 80px; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { padding: 20px; border-bottom: 1px solid #333; }
    .card { background: #111; padding: 20px; margin: 10px; border-radius: 12px; border: 1px solid #333; }
    
    /* 입력 그리드 */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    input { background: #222; border: 1px solid #444; color: white; padding: 10px; width: 100%; border-radius: 6px; margin-top: 5px; }
    
    /* 하단 고정 네비게이션 (클릭 문제 해결) */
    .nav { position: fixed; bottom: 0; width: 100%; max-width: 600px; background: #000; display: flex; border-top: 1px solid #333; z-index: 999; }
    .nav button { flex: 1; padding: 15px; background: none; border: none; color: #fff; font-size: 0.8rem; cursor: pointer; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <div class="header"><h1>TimingStaff Pro</h1></div>

  <div id="homeScreen" class="screen">
    <div class="card">
      <h3>💼 시재금 점검</h3>
      <input type="text" id="staffName" placeholder="기입자 이름">
      
      <h4 style="margin-top:20px;">[ 구분 선택 ]</h4>
      <select id="workType" style="width:100%; padding:10px; background:#222; color:white;">
        <option value="open">오픈 (Open)</option>
        <option value="close">마감 (Close)</option>
      </select>

      <h4 style="margin-top:20px;">준비시재 (매장보관)</h4>
      <div class="grid-2">
        <input type="number" id="ready50k" placeholder="5만원(장)">
        <input type="number" id="ready10k" placeholder="1만원(장)">
      </div>

      <h4 style="margin-top:20px;">예비시재 (금고/금전함)</h4>
      <div class="grid-2">
        <input type="number" id="reserve50k" placeholder="5만원(장)">
        <input type="number" id="reserve10k" placeholder="1만원(장)">
      </div>

      <button onclick="saveCashData()" style="width:100%; padding:15px; margin-top:20px; background:blue; color:white; border:none; border-radius:8px;">기록 저장하기</button>
    </div>
  </div>
</div>

<nav class="nav">
  <button onclick="showScreen('homeScreen')">🏠 홈</button>
  <button onclick="alert('일정표 준비중')">🗓️ 일정표</button>
  <button onclick="alert('관리자 모드')">👑 관리자</button>
</nav>

<script>
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  async function saveCashData() {
    const name = document.getElementById('staffName').value;
    if(!name) { alert("기입자 이름을 입력하세요."); return; }
    // 여기서 Supabase로 데이터를 전송합니다.
    alert(name + "님의 " + document.getElementById('workType').value + " 기록이 저장되었습니다.");
  }
</script>
</body>
</html>
