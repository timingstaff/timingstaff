<section id="homeScreen" class="app-screen">
  <div class="card notice-card">
    <div class="card-header">
      <h3>📢 공지사항</h3>
    </div>
    <div class="notice-content">
      <p id="noticeText">공지사항을 불러오는 중입니다...</p>
    </div>
    <button id="btnNoticeConfirm" class="btn btn-primary btn-block">확인했습니다</button>
    <div id="noticeReadList" class="read-status-list"></div>
  </div>

  <div class="card attendance-card">
    <div class="card-header">
      <h3>⏰ 출퇴근 기록</h3>
    </div>
    <div class="btn-grid">
      <button id="btnClockIn" class="btn btn-success">출근하기</button>
      <button id="btnClockOut" class="btn btn-danger">퇴근하기</button>
    </div>
    <div class="status-footer">
      <p id="txtClockStatus" class="status-text">아직 출근 기록이 없습니다.</p>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h3>💰 당일 매출 기록</h3>
    </div>
    <div class="form-group-grid">
      <div class="form-group"><label>카드</label><input type="number" id="salesCard" placeholder="0"></div>
      <div class="form-group"><label>현금</label><input type="number" id="salesCash" placeholder="0"></div>
      <div class="form-group"><label>계좌이체</label><input type="number" id="salesTransfer" placeholder="0"></div>
      <div class="form-group"><label>준비시재</label><input type="number" id="salesReady" placeholder="0"></div>
      <div class="form-group"><label>예비시재</label><input type="number" id="salesReserve" placeholder="0"></div>
    </div>
    <button id="btnSaveSales" class="btn btn-primary btn-block" style="margin-top:12px;">매출 기록하기</button>
  </div>
</section>

<section id="catCareScreen" class="app-screen hidden">
  <div class="card">
    <div class="card-header">
      <h3>🐱 냥케어 기록</h3>
    </div>
    <p class="section-desc">오픈/마감 케어 및 특이사항을 기록해 주세요.</p>
    </div>
</section>
