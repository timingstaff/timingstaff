<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimingStaff</title>
  <style>
    body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
    .container { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
    .header { padding: 20px; border-bottom: 1px solid #333; }
    .card { background: #111; padding: 20px; margin: 10px; border-radius: 10px; border: 1px solid #333; }
    /* 하단 탭 강제 고정 */
    .nav { position: fixed; bottom: 0; width: 100%; max-width: 600px; background: #000; display: flex; border-top: 1px solid #333; padding: 10px 0; }
    .nav button { flex: 1; background: none; border: none; color: #fff; cursor: pointer; font-size: 0.8rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <div class="header"><h1>TimingStaff Pro</h1></div>

  <div id="homeScreen" class="screen">
    <div class="card"><h3>환영합니다</h3><p>출퇴근 버튼을 눌러 시작하세요.</p></div>
  </div>
  
  <div id="scheduleScreen" class="screen hidden">
    <div class="card"><h3>근무 일정표</h3><div id="calendarArea">달력 준비 중...</div></div>
  </div>
</div>

<nav class="nav">
  <button onclick="showScreen('homeScreen')">홈</button>
  <button onclick="showScreen('scheduleScreen')">일정표</button>
  <button onclick="alert('준비중')">업무</button>
</nav>

<script>
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }
  console.log("페이지 로드 완료");
</script>

</body>
</html>
