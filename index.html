      margin-top: 15px;
      background: var(--bg-card, #121212);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 14px;
      padding: 12px;
    }
    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);

      font-weight: 700;
      font-size: 0.85rem;
      color: var(--text-muted, #aaaaaa);
      margin-bottom: 10px;
      border-bottom: 2px solid var(--border, #2a2a2a);
      padding-bottom: 8px;
    }
    .calendar-days div:first-child { color: #ff4d4d; }
    .calendar-days div:last-child { color: #4da6ff; }
