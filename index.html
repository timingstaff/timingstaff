<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimingStaff Pro</title>
  <style>
    body { background: #000; color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding-bottom: 90px; }
    .container { max-width: 600px; margin: 0 auto; padding: 10px; }
    
    /* 헤더 스타일 */
    .header-box { background: #1a1a1a; padding: 20px; border-radius: 16px; margin-bottom: 15px; }
    .brand { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .weather-info { font-size: 0.85rem; color: #aaa; display: flex; gap: 15px; }
    
    /* 공지사항 스타일 */
    .notice { font-size: 0.9rem; border-left: 3px solid #5856d6; padding-left: 10px; margin-top: 15px; color: #eee; }
    
    /* 카드 및 입력 스타일 */
    .card { background: #111; padding: 20px; margin-bottom: 15px; border-radius: 16px; border: 1px solid #333; }
    h3 { margin-top: 0; font-size: 1.1rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    input { background: #222; border: 1px solid #444; color: #fff; padding: 10px; width: 100%; border-radius: 8px; box-sizing: border-box; }
    
    /* 네비게이션 스타일 */
    .nav { position: fixed; bottom: 0; width: 100%; max-width: 600px; background: #000; border-top: 1px solid #333; display: flex; height: 70px; align-items: center; z-index: 999; }
    .nav button { flex: 1; background: none; border: none; color: #fff; font-size: 0.75rem; cursor: pointer; }
    
    .screen { display: none; }
    .screen.active { display: block; }
  </style>
</head>
<body>

<div id="homeScreen" class="screen active">
  <div class="container">
    
    <header class="header-box">
      <div class="brand">
        <h1 style="font-size: 1.5rem; margin:0;">TimingStaff <span style="color:#5856d6">Pro</span></h1>
        <div style="font-weight:bold;">마린님</div>
      </div>
      <div class="weather-info">
        <span>📅 2026.07.10</span>
        <span>🌤 31°C</span>
        <span>☂️ 20%</span>
      </div>
      <div class="notice">📢 "오늘 마감 시재 점검 필수!"</div>
    </header>

    <div class="card">
      <h3>⏰ 출퇴근</h3>
      <div class="grid-2">
        <button style="padding:15px; background:#166534; border:none; color:white; border-radius:10px; font-weight:bold;">출근</button>
        <button style="padding:15px; background:#991b1b; border:none; color:white; border-radius:10px; font-weight:bold;">퇴근</button>
      </div>
    </div>

    <div class="card">
      <h3>💰 시재금 점검</h3>
      <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button id="btn-open" class="tab-btn active" onclick="switchTab('open')">오픈(Open)</button>
        <button id="btn-close" class="tab-btn" onclick="switchTab('close')">마감(Close)</button>
      </div>
      <p style="color:#666; font-size:0.8rem;">* 입력칸을 누르면 합계가 계산됩니다.</p>
    </div>

  </div>
</div>

<script>
  // 기존 로직 유지...
</script>
</body>
</html>
