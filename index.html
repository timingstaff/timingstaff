<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimingStaff Pro</title>
  <style>
    body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
    .container { max-width: 600px; margin: 0 auto; }
    /* 헤더 스타일 */
    .header { padding: 20px; border-bottom: 1px solid #333; }
    .header-top { display: flex; justify-content: space-between; align-items: center; }
    .user-badge { background: #222; padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; }
    /* 카드 스타일 */
    .card { background: #111; padding: 15px; margin: 10px; border-radius: 12px; border: 1px solid #333; }
    /* 네비게이션 스타일 */
    .nav { position: fixed; bottom: 0; width: 100%; max-width: 600px; background: #000; display: flex; border-top: 1px solid #333; padding: 10px 0; z-index: 999; }
    .nav button { flex: 1; border: none; background: none; color: #aaa; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .nav button.active { color: #fff; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="header-top">
      <h1>TimingStaff <span style="color:#6366f1">Pro</span></h1>
      <div class="user-badge">👤 마린님</div>
    </div>
    <div style="font-size:0.8rem; color:#888; margin-top:5px;">2026.07.10 (금) | 🌤 31°C ☔ 20%</div>
  </header>

  <main id="view-home" class="view">
    <div class="card">
      <h3>📢 공지사항</h3>
      <p id="notice-text">공지사항을 불러오는 중입니다...</p>
      <button style="width:100%; padding:10px; background:#4f46e5; color:white; border:none; border-radius:6px;">확인했습니다</button>
    </div>
    <div class="card">
      <h3>⏰ 출퇴근 기록</h3>
      <div style="display:flex; gap:10px;">
        <button style="flex:1; padding:15px; background:green; color:white; border:none; border-radius:8px;">출근하기</button>
        <button style="flex:1; padding:15px; background:red; color:white; border:none; border-radius:8px;">퇴근하기</button>
      </div>
    </div>
  </main>

  <main id="view-schedule" class="view hidden">
    <div class="card">
      <h3>🗓️ 이번 주 근무 일정표</h3>
      <input type="text" placeholder="근무자 이름 (예: 마린)" style="width:100%; padding:10px; margin:5px 0; background:#222; color:white; border:1px solid #444;">
      <button style="width:100%; padding:10px; background:#4f46e5; color:white; border:none; margin-top:10px;">등록</button>
      <p style="text-align:center; margin-top:20px; color:#666;">데이터를 로드하는 중입니다...</p>
    </div>
  </main>

  <nav class="nav">
    <button onclick="showView('view-home', this)" class="active">🏠 홈</button>
    <button onclick="showView('view-schedule', this)">🗓️ 일정표</button>
    <button onclick="alert('업무일지')">📋 업무일지</button>
    <button onclick="alert('재고')">📦 재고</button>
    <button onclick="alert('고양이')">🐱 고양이</button>
    <button onclick="alert('관리자')">👑 관리자</button>
  </nav>
</div>

<script>
  function showView(id, btn) {
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
</script>
</body>
</html>
